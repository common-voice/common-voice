services:
  # To enable speaking for a locale: sudo docker exec db mysql -uvoicecommons -pvoicecommons voiceweb -e "UPDATE locales SET is_contributable=1 WHERE name='fr';"
  # then:
  # sudo docker exec -it redis redis-cli FLUSHALL
  # sudo docker restart web
  db:
    image: mysql:8.0.31
    networks:
      - voice-web
      - common-voice-network
    container_name: db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=voiceweb
      - MYSQL_USER=voicecommons
      - MYSQL_PASSWORD=voicecommons
      - MYSQL_ROOT_PASSWORD=voicewebroot
    volumes:
      - ./docker/mysql-data:/var/lib/mysql
    command: mysqld --sql_mode="STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - voice-web
  storage:
    image: fsouza/fake-gcs-server
    container_name: storage
    volumes:
      - ./docker/voice-clips:/storage/common-voice-clips
    networks:
      - voice-web
    command:
      [
        '-scheme',
        'http',
        '-port',
        '8080',
        '-external-url',
        'http://storage:8080',
        '-backend',
        'filesystem',
      ]
  bundler:
    build:
      context: ./bundler
      dockerfile: Dockerfile
    container_name: bundler
    user: '${UID:-1000}:${GID:-1000}'
    links:
      - db
      - redis
      - storage
    volumes:
      - ./bundler:/code
    networks:
      - voice-web
    command: bash -c "npm ci && npm run build && npm start"
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: web
    user: '${UID:-1000}:${GID:-1000}'
    links:
      - db
      - redis
      - storage
    volumes:
      - .:/code
    environment:
      - DOTENV_CONFIG_PATH=/code/.env-local-docker
    networks:
      - voice-web
      - common-voice-network
    ports:
      - 9000:9000
    command: bash -c "/code/docker/wait-for-it.sh storage:8080 -- /code/docker/prepare_storage.sh && yarn --frozen-lockfile && yarn start"

networks:
  voice-web:
  common-voice-network:
    name: common-voice-network
